<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a0a1a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json?v=1.13">
  <link rel="icon" href="icon-192.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon-192.svg">
  <title>CalcMaster Pro</title>
  <meta name="app-version" content="1.13">
  <meta name="app-build" content="2026-06-04">
  <link rel="stylesheet" href="style.css?v=1.13">
  <style>
    #updateBanner {
      display: none;
      position: fixed;
      bottom: 80px; left: 50%;
      transform: translateX(-50%);
      background: #6c63ff;
      color: #fff;
      padding: 12px 24px;
      border-radius: 12px;
      cursor: pointer;
      z-index: 9999;
      font-size: 14px;
      box-shadow: 0 4px 20px rgba(108,99,255,0.4);
      animation: slideUp 0.4s ease;
      direction: rtl;
    }
    @keyframes slideUp {
      from { transform: translateX(-50%) translateY(30px); opacity: 0; }
      to { transform: translateX(-50%) translateY(0); opacity: 1; }
    }
  </style>
  <script>
  (function(){
    // === Reset mode ===
    if (location.search.includes('reset')) {
      localStorage.clear();
      if ('caches' in window) { caches.keys().then(function(ks){ ks.forEach(function(k){ caches.delete(k); }); }); }
      if ('serviceWorker' in navigator) { navigator.serviceWorker.getRegistration().then(function(r){ if (r) r.unregister(); }); }
      setTimeout(function(){ location.href = location.pathname; }, 300);
      return;
    }

    // === SW Update Detection ===
    function showUpdateBanner() {
      var b = document.createElement('div');
      b.id = 'updateBanner';
      b.textContent = '🔄 تحديث جديد متوفر — اضغط للتطبيق';
      b.onclick = function(){
        if ('serviceWorker' in navigator && navigator.serviceWorker.controller) {
          navigator.serviceWorker.controller.postMessage({ type: 'SKIP_WAITING' });
        }
        localStorage.clear();
        if ('caches' in window) { caches.keys().then(function(ks){ ks.forEach(function(k){ caches.delete(k); }); }); }
        setTimeout(function(){ location.reload(); }, 300);
      };
      document.body.appendChild(b);
      b.style.display = 'block';
    }

    if ('serviceWorker' in navigator) {
      // Register SW
      navigator.serviceWorker.register('sw.js')
        .then(function(reg) {
          // Check if there's already a waiting SW
          if (reg.waiting) {
            showUpdateBanner();
          }
          // Listen for new SW installations
          reg.addEventListener('updatefound', function() {
            var newSW = reg.installing;
            newSW.addEventListener('statechange', function() {
              if (newSW.state === 'installed' && navigator.serviceWorker.controller) {
                showUpdateBanner();
              }
            });
          });
        })
        .catch(function(){});

      // When a new SW takes over — reload automatically
      var refreshing = false;
      navigator.serviceWorker.addEventListener('controllerchange', function() {
        if (!refreshing) {
          refreshing = true;
          location.reload();
        }
      });
    }

    // === Version Check (bypass SW) ===
    var lastVer = localStorage.getItem('calcVer');
    // Use a different URL pattern so SW cache doesn't interfere
    var vUrl = 'version.json?x=' + Date.now() + '&bypass=' + Math.random();
    fetch(vUrl, { cache: 'no-store', mode: 'cors' })
      .then(function(r){ return r.json(); })
      .then(function(d){
        if (lastVer && lastVer !== d.version) {
          localStorage.clear();
          if ('caches' in window) { caches.keys().then(function(ks){ ks.forEach(function(k){ caches.delete(k); }); }); }
          if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistration().then(function(r){ if (r) r.unregister(); });
          }
          setTimeout(function(){ location.reload(); }, 200);
        }
        localStorage.setItem('calcVer', d.version);
      })
      .catch(function(){});
  })();
  </script>
</head>
<body>

  <div class="app-container">

    <header>
      <div class="header-left">
        <button class="icon-btn" id="menuBtn" aria-label="القائمة">☰</button>
        <div class="brand">
          <span class="brand-icon">∑</span>
          <span class="brand-text">CalcMaster</span>
          <span class="version-badge" id="headerVer">v1.13</span>
        </div>
      </div>
      <div class="header-right">
        <button class="icon-btn" id="themeBtn" aria-label="السمة">🌙</button>
        <button class="icon-btn" id="histBtn" aria-label="السجل">⏱</button>
      </div>
    </header>

    <div id="toast" class="toast"></div>
    <div id="updateBanner" class="update-banner">
      <span>📦 تحديث جديد متاح</span>
      <button id="updateBtn">تحديث الآن</button>
    </div>

    <div class="history-panel" id="historyPanel">
      <div class="history-header">
        <h3>السجل</h3>
        <button class="icon-btn" id="clearHist">🗑</button>
        <button class="icon-btn" id="closeHist">✕</button>
      </div>
      <div class="history-list" id="historyList"></div>
    </div>

    <div class="calc-body">

      <div class="expression" id="expression"></div>
      <div class="display" id="display">0</div>

      <div class="mode-tabs">
        <button class="mode-tab active" data-mode="basic">أساسي</button>
        <button class="mode-tab" data-mode="sci">علمي</button>
        <button class="mode-tab" data-mode="age">عمر</button>
        <button class="mode-tab" data-mode="convert">كتابة</button>
      </div>

      <div class="sci-panel" id="sciPanel">
        <button class="sci-btn">sin</button>
        <button class="sci-btn">cos</button>
        <button class="sci-btn">tan</button>
        <button class="sci-btn">log</button>
        <button class="sci-btn">ln</button>
        <button class="sci-btn">√</button>
        <button class="sci-btn">x²</button>
        <button class="sci-btn">x³</button>
        <button class="sci-btn">xʸ</button>
        <button class="sci-btn">π</button>
        <button class="sci-btn">e</button>
        <button class="sci-btn">!</button>
        <button class="sci-btn">1/x</button>
        <button class="sci-btn">|x|</button>
        <button class="sci-btn">(</button>
        <button class="sci-btn">)</button>
      </div>

      <div class="age-panel" id="agePanel">
        <div class="age-inputs">
          <div class="age-field">
            <label>🎂 اليوم</label>
            <select id="ageDay"></select>
          </div>
          <div class="age-field">
            <label>📅 الشهر</label>
            <select id="ageMonth"></select>
          </div>
          <div class="age-field">
            <label>📆 السنة</label>
            <select id="ageYear"></select>
          </div>
        </div>
        <button class="age-btn" id="ageBtn">🔮 حساب العمر</button>
        <div class="age-results" id="ageResults">
          <div class="age-card">
            <div class="age-num" id="ageYearsVal">--</div>
            <div class="age-unit">سنة</div>
          </div>
          <div class="age-card">
            <div class="age-num" id="ageMonthsVal">--</div>
            <div class="age-unit">شهر</div>
          </div>
          <div class="age-card">
            <div class="age-num" id="ageWeeksVal">--</div>
            <div class="age-unit">أسبوع</div>
          </div>
          <div class="age-card">
            <div class="age-num" id="ageDaysVal">--</div>
            <div class="age-unit">يوم</div>
          </div>
          <div class="age-card">
            <div class="age-num" id="ageHoursVal">--</div>
            <div class="age-unit">ساعة</div>
          </div>
          <div class="age-card">
            <div class="age-num" id="ageMinsVal">--</div>
            <div class="age-unit">دقيقة</div>
          </div>
        </div>
      </div>

      <div class="convert-panel" id="convertPanel">
        <div class="lang-selector">
          <button class="lang-btn active" data-lang="ar">AR</button>
          <button class="lang-btn" data-lang="fr">FR</button>
          <button class="lang-btn" data-lang="en">EN</button>
        </div>
        <div class="curr-selector">
          <select class="curr-select" id="currSelect">
            <option value="">🔢 بدون عملة</option>
            <option value="MAD">🇲🇦 درهم مغربي (MAD)</option>
            <option value="USD">🇺🇸 دولار أمريكي (USD)</option>
            <option value="EUR">🇪🇺 يورو (EUR)</option>
            <option value="GBP">🇬🇧 جنيه إسترليني (GBP)</option>
          </select>
        </div>
        <div class="convert-output" id="convertOutput" dir="auto"></div>
      </div>

      <div class="memory-bar">
        <button class="mem-btn mem-mc" data-mem="mc">MC</button>
        <button class="mem-btn" data-mem="mr">MR</button>
        <button class="mem-btn" data-mem="mplus">M+</button>
        <button class="mem-btn" data-mem="mminus">M−</button>
        <span class="mem-indicator" id="memIndicator">M</span>
      </div>

      <div class="buttons">

        <button class="btn btn-clear" data-action="clear">AC</button>
        <button class="btn btn-clear" data-action="backspace">⌫</button>
        <button class="btn btn-op" data-action="percent">%</button>
        <button class="btn btn-op" data-action="divide">÷</button>

        <button class="btn btn-num" data-value="7">7</button>
        <button class="btn btn-num" data-value="8">8</button>
        <button class="btn btn-num" data-value="9">9</button>
        <button class="btn btn-op" data-action="multiply">×</button>

        <button class="btn btn-num" data-value="4">4</button>
        <button class="btn btn-num" data-value="5">5</button>
        <button class="btn btn-num" data-value="6">6</button>
        <button class="btn btn-op" data-action="subtract">−</button>

        <button class="btn btn-num" data-value="1">1</button>
        <button class="btn btn-num" data-value="2">2</button>
        <button class="btn btn-num" data-value="3">3</button>
        <button class="btn btn-op" data-action="add">+</button>

        <button class="btn btn-num btn-neg" data-action="negate">±</button>
        <button class="btn btn-num" data-value="0">0</button>
        <button class="btn btn-num" data-action="decimal">.</button>
        <button class="btn btn-equals" data-action="equals">=</button>

      </div>
    </div>

    <footer>
      <span>CalcMaster Pro v<span id="verDisplay">1.13</span> © 2026</span>
    </footer>
  </div>

  <script src="script.js?v=1.13"></script>
</body>
</html>
